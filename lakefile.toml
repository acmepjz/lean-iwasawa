name = "Iwasawalib"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Iwasawalib"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
experimental.module = true

# temporary workaround, otherwise `erw` is needed extensively
backward.isDefEq.respectTransparency = false

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"

[[require]]
name = "mathlib"
scope = "leanprover-community"

[[lean_lib]]
name = "Iwasawalib"
